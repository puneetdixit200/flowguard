services:
  - type: web
    name: flowguard
    runtime: docker
    plan: free
    region: singapore
    dockerfilePath: ./ml-service/Dockerfile
    dockerContext: .
    healthCheckPath: /health
    autoDeployTrigger: commit
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: flowguard-postgres
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: keyvalue
          name: flowguard-cache
          property: connectionString

  - type: keyvalue
    name: flowguard-cache
    plan: free
    region: singapore
    ipAllowList: []

databases:
  - name: flowguard-postgres
    plan: free
    region: singapore
    databaseName: flowguard
    user: flowguard
